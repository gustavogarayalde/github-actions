name: "Build with Gradle"
inputs:
  token:
    description: "Github Token"
    required: true
  skip-tests:
    description: "true | false"
    required: false
    default: "false"
  keystore:
    description: "Android Keystore file (base64 encoded)"
    required: false
  keystore-password:
    description: "Keystore password"
    required: false
  key-alias:
    description: "Key alias"
    required: false
  key-password:
    description: "Key password"
    required: false

runs:
  using: "composite"
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}

    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v1

    - name: Decode Keystore
      if: ${{ inputs.keystore != '' }}
      shell: bash
      run: |
        echo "${{ inputs.keystore }}" | base64 -d > ${{ github.workspace }}/release.keystore
        echo "KEYSTORE_FILE=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
        echo "KEYSTORE_PASSWORD=${{ inputs.keystore-password }}" >> $GITHUB_ENV
        echo "KEY_ALIAS=${{ inputs.key-alias }}" >> $GITHUB_ENV
        echo "KEY_PASSWORD=${{ inputs.key-password }}" >> $GITHUB_ENV

    - name: Run Tests and Lint
      if: ${{ inputs.skip-tests != 'true' }}
      shell: bash
      run: ./gradlew test lint --stacktrace

    - name: Build Android Debug APK
      shell: bash
      run: |
        if [ "${{ inputs.skip-tests }}" == "true" ]; then
          ./gradlew assembleDebug -x test -x lint --stacktrace
        else
          ./gradlew assembleDebug --stacktrace
        fi

    - name: Build Android Release APK
      shell: bash
      run: |
        GRADLE_ARGS=""
        if [ "${{ inputs.skip-tests }}" == "true" ]; then
          GRADLE_ARGS="-x test -x lint"
        fi
        
        if [ -n "${{ inputs.keystore }}" ]; then
          ./gradlew assembleRelease $GRADLE_ARGS \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace
        else
          ./gradlew assembleRelease $GRADLE_ARGS --stacktrace
        fi

    - name: Build Android Debug Bundle
      shell: bash
      run: |
        if [ "${{ inputs.skip-tests }}" == "true" ]; then
          ./gradlew bundleDebug -x test -x lint --stacktrace
        else
          ./gradlew bundleDebug --stacktrace
        fi

    - name: Build Android Release Bundle
      shell: bash
      run: |
        GRADLE_ARGS=""
        if [ "${{ inputs.skip-tests }}" == "true" ]; then
          GRADLE_ARGS="-x test -x lint"
        fi
        
        if [ -n "${{ inputs.keystore }}" ]; then
          ./gradlew bundleRelease $GRADLE_ARGS \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace
        else
          ./gradlew bundleRelease $GRADLE_ARGS --stacktrace
        fi

    - name: Upload Android artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-builds
        path: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/release/*.apk
          **/build/outputs/bundle/debug/*.aab
          **/build/outputs/bundle/release/*.aab

    - name: Clean up keystore
      if: always()
      shell: bash
      run: rm -f ${{ github.workspace }}/release.keystore
